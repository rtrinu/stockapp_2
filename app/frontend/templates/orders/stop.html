{% extends "base_template.html" %} {% block content %}
<div class="order-container">
  <h2 class="order-title">Stop Order</h2>

  <form class="order-form" method="post" action="/orders">
    <input name="symbol" placeholder="Symbol (AAPL)" required />
    <input
      name="qty"
      type="number"
      step="0.01"
      placeholder="Quantity"
      required
    />
    <input
      name="stop_price"
      type="number"
      step="0.01"
      placeholder="Stop Price"
      required
    />

    <input type="hidden" name="order_type" value="stop" />

    <select name="side">
      <option value="buy">Buy</option>
      <option value="sell">Sell</option>
    </select>

    <button class="btn-primary" type="submit">Place Stop Order</button>
  </form>

  <div class="order-actions">
    <a href="/orders/market">Market</a>
    <a href="/orders/limit">Limit</a>
  </div>
</div>
{% endblock %}
